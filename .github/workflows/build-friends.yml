name: Build Friends Data

'on':
  issues:
    types: [labeled]

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.label.name == '审核通过'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse config.yml
        id: config
        run: |
          APPROVED_LABEL=$(python3 -c "import yaml; c=yaml.safe_load(open('config.yml')); print(c['labels']['approved'])")
          TARGET_REPO=$(python3 -c "import yaml; c=yaml.safe_load(open('config.yml')); print(c['target']['repo'])")
          TARGET_FILE=$(python3 -c "import yaml; c=yaml.safe_load(open('config.yml')); print(c['target']['file'])")
          TARGET_BRANCH=$(python3 -c "import yaml; c=yaml.safe_load(open('config.yml')); print(c['target']['branch'])")
          DEFAULT_TAGS=$(python3 -c "import yaml,json; c=yaml.safe_load(open('config.yml')); print(json.dumps(c['defaults']['tags'], ensure_ascii=False))")
          echo "approved_label=$APPROVED_LABEL" >> $GITHUB_OUTPUT
          echo "target_repo=$TARGET_REPO" >> $GITHUB_OUTPUT
          echo "target_file=$TARGET_FILE" >> $GITHUB_OUTPUT
          echo "target_branch=$TARGET_BRANCH" >> $GITHUB_OUTPUT
          echo "default_tags=$DEFAULT_TAGS" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build friends.ts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUES_REPO: ${{ github.repository }}
          APPROVED_LABEL: ${{ steps.config.outputs.approved_label }}
          OWNER_LOGIN: ${{ github.repository_owner }}
          DEFAULT_TAGS: ${{ steps.config.outputs.default_tags }}
          OUTPUT_FILE: friends.ts
        run: node .github/scripts/build-friends.js

      - name: Checkout content repo
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.config.outputs.target_repo }}
          token: ${{ secrets.CONTENT_REPO_TOKEN }}
          path: content-repo
          ref: ${{ steps.config.outputs.target_branch }}

      - name: Copy file to content repo
        run: |
          TARGET_FILE="${{ steps.config.outputs.target_file }}"
          mkdir -p "content-repo/$(dirname $TARGET_FILE)"
          cp friends.ts "content-repo/$TARGET_FILE"

      - name: Commit and push
        run: |
          cd content-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.config.outputs.target_file }}"
          if git diff --staged --quiet; then
            echo "No changes, skipping commit"
            exit 0
          fi
          git commit -m "chore(friends): update friends.ts (triggered by #${{ github.event.issue.number }})"
          git push
